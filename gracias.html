<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu consulta! | Topo4D</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter & Bai Jamjuree -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Bai Jamjuree', 'sans-serif'],
                    },
                    colors: {
                        primary: '#1b4332',
                        secondary: '#4CAF50',
                        dark: '#0f291e',
                        light: '#f0f4f0',
                    },
                }
            }
        }
    </script>

    <style>
        /* WhatsApp pulse */
        @keyframes pulse-green {
            0%   { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70%  { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .whatsapp-float { animation: pulse-green 2s infinite; }

        /* Check bounce */
        @keyframes bounceIn {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.15); opacity: 1; }
            80%  { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .bounce-in { animation: bounceIn 0.7s ease both; }

        /* Fade up */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up   { animation: fadeUp 0.6s ease both; }
        .delay-1   { animation-delay: 0.3s; }
        .delay-2   { animation-delay: 0.5s; }
        .delay-3   { animation-delay: 0.7s; }
        .delay-4   { animation-delay: 0.9s; }

        /* Topo pattern */
        body {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231b4332' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="font-sans text-slate-700 bg-light antialiased min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="w-full bg-primary shadow-lg">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html">
                <img src="images/logo.png" alt="Topo4D Logo" class="h-12 object-contain filter drop-shadow-lg">
            </a>
            <a href="index.html#contacto" class="hidden md:inline-block text-sm text-white/70 hover:text-secondary transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>Volver al inicio
            </a>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow flex items-center justify-center py-16 px-4">
        <div class="w-full max-w-lg text-center">

            <!-- Check icon -->
            <div class="bounce-in flex items-center justify-center mx-auto mb-8 w-24 h-24 rounded-full bg-secondary shadow-xl shadow-secondary/30">
                <i class="fas fa-check text-4xl text-white"></i>
            </div>

            <!-- Title -->
            <h1 class="font-heading text-4xl md:text-5xl font-extrabold text-primary mb-4 fade-up delay-1">
                ¡Mensaje enviado!
            </h1>

            <!-- Subtitle -->
            <p class="text-lg text-slate-600 mb-2 fade-up delay-2">
                Gracias por contactarte con <span class="font-bold text-primary">TOPO4D</span>.
            </p>
            <p class="text-slate-500 mb-10 fade-up delay-2">
                Nos pondremos en contacto con vos a la brevedad para asesorarte.
            </p>

            <!-- Divider -->
            <div class="w-16 h-1 bg-secondary mx-auto mb-10 rounded fade-up delay-2"></div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row justify-center gap-4 fade-up delay-3">
                <a href="index.html"
                   class="px-8 py-3 bg-primary hover:bg-dark text-white font-semibold rounded shadow-lg transition text-center flex items-center justify-center gap-2">
                    <i class="fas fa-home"></i> Volver al inicio
                </a>
                <a href="https://wa.me/5493834612365?text=Hola%20TOPO4D%2C%20quisiera%20hacer%20una%20consulta." target="_blank"
                   class="px-8 py-3 bg-[#25d366] hover:bg-[#1ebe5d] text-white font-semibold rounded shadow-lg transition text-center flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp text-lg"></i> WhatsApp
                </a>
            </div>

            <!-- Footer note -->
            <p class="mt-12 text-xs text-slate-400 fade-up delay-4">
                San F. del Valle de Catamarca, Argentina &nbsp;·&nbsp; Lunes a Viernes 8:00 – 18:00 hs
            </p>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-primary text-slate-400 py-8 border-t border-slate-800 text-center text-xs">
        <p>&copy; <span id="current-year"></span> TOPO4D. Todos los derechos reservados.</p>
    </footer>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/5493834612365?text=Hola%20TOPO4D%2C%20quisiera%20hacer%20una%20consulta." target="_blank"
       class="fixed bottom-6 right-6 z-50 whatsapp-float bg-[#25d366] text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-lg hover:scale-110 transition-transform duration-300">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
